packages:
  - 'apps/*'
  - 'packages/*'
  - 'perf'

minimumReleaseAge: 4320
# Browser-compat data tables publish DAILY, so a 3-day cooldown on them is
# impractical (it would trip CI's lockfile supply-chain check on nearly every
# lockfile change) and low-value (build-time data, not executable code). Excluded
# so they don't perpetually block CI; the cooldown stays full-strength on
# everything else. (Surfaced by pnpm 11.5+'s frozen-install policy enforcement.)
minimumReleaseAgeExclude:
  - caniuse-lite
  - electron-to-chromium
  - browserslist
  # TEMPORARY (tracked in #442): Dependabot's #429 (nuxt) + #432 (vitest) lockfile
  # regens floated these two transitives to versions younger than the cooldown,
  # and those are the versions the rest of the tree needs (downgrading type-fest
  # to a compliant version breaks Storybook's story types). Excluding keeps them
  # at the working 5.8.0 / 16.2.1 without touching the lockfile. Drop these two
  # once they age past minimumReleaseAge (type-fest 5.8.0 after 2026-07-07, globby
  # 16.2.1 after 2026-07-09) so they float normally again.
  - globby
  - type-fest

patchedDependencies:
  '@nuxt/test-utils@4.0.0': patches/@nuxt__test-utils@4.0.0.patch
publicHoistPattern:
  - vitest
  - '@vitest/*'
  - vite-node
  - eslint
  - '@typescript-eslint/*'
  - semver
allowBuilds:
  esbuild: true
  '@parcel/watcher': true
  prisma: true
  sharp: true
  canvas: true
  '@prisma/engines': false
  msw: false
  unrs-resolver: false
  vue-demi: true
