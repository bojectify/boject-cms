pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,ts,vue}'
      run: pnpm exec eslint {staged_files}

    - name: format
      glob: '*.{js,mjs,ts,vue,json,yml,yaml,css,scss,md}'
      exclude: 'pnpm-lock.yaml'
      run: pnpm exec prettier --check {staged_files}

    - name: typecheck
      glob: '*.{ts,vue}'
      run: pnpm typecheck
