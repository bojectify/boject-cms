pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,ts,vue}'
      run: pnpm lint

    - name: format
      glob: '*.{js,mjs,ts,vue,json,yml,yaml,css,scss,md}'
      exclude: 'pnpm-lock.yaml'
      run: pnpm prettier --check {staged_files}

    - name: typecheck-cms
      glob: 'apps/cms/**/*.{ts,vue}'
      run: pnpm --filter cms typecheck

    - name: typecheck-scaffolder
      glob: 'packages/create-boject-cms/**/*.ts'
      run: pnpm --filter create-boject-cms typecheck

    - name: typecheck-cli
      glob: 'packages/boject-cli/**/*.ts'
      run: pnpm --filter @boject/cli typecheck

    - name: typecheck-scripts
      glob: 'scripts/**/*.ts'
      run: pnpm typecheck:scripts

pre-push:
  jobs:
    - name: test
      run: pnpm test
      skip:
        # Skip only when the agent set WALLABY_VERIFIED=1 AND Wallaby is
        # actually running in the IDE (~/.wallaby/.processes/ is non-empty
        # while Wallaby has live runners; empty when the IDE is closed or
        # Wallaby is stopped). Belt-and-braces against an agent setting the
        # flag based on a stale/disconnected MCP response.
        - run: |
            test "$WALLABY_VERIFIED" = "1" \
              && [ -n "$(ls -A "$HOME/.wallaby/.processes" 2>/dev/null)" ]

    - name: storybook-test
      run: pnpm --filter cms test:storybook
      skip:
        - run: test "$SKIP_STORYBOOK_TEST" = "1"
