pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,ts,vue}'
      run: pnpm lint

    - name: format
      glob: '*.{js,mjs,ts,vue,json,yml,yaml,css,scss,md}'
      exclude: 'pnpm-lock.yaml'
      run: pnpm format {staged_files}

    - name: typecheck
      glob: '*.{ts,vue}'
      run: pnpm typecheck

pre-push:
  jobs:
    - name: test
      run: pnpm test:run
