pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,ts,vue}'
      run: pnpm lint

    - name: format
      glob: '*.{js,mjs,ts,vue,json,yml,yaml,css,scss,md}'
      exclude: 'pnpm-lock.yaml'
      run: pnpm prettier --check {staged_files}

    - name: typecheck-cms
      glob: 'apps/cms/**/*.{ts,vue}'
      run: pnpm --filter cms typecheck

    - name: typecheck-scaffolder
      glob: 'packages/create-boject-cms/**/*.ts'
      run: pnpm --filter create-boject-cms typecheck

    - name: typecheck-cli
      glob: 'packages/boject-cli/**/*.ts'
      run: pnpm --filter @boject/cli typecheck

    - name: typecheck-scripts
      glob: 'scripts/**/*.ts'
      run: pnpm typecheck:scripts

    - name: typecheck-perf
      glob: 'perf/**/*.ts'
      run: pnpm --filter perf typecheck && pnpm --filter perf typecheck:k6

pre-push:
  jobs:
    - name: test
      run: pnpm test

    - name: storybook-test
      run: pnpm --filter cms test:storybook
      skip:
        - run: test "$SKIP_STORYBOOK_TEST" = "1"
