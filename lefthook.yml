pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,ts,vue}'
      run: pnpm lint

    - name: format
      glob: '*.{js,mjs,ts,vue,json,yml,yaml,css,scss,md}'
      exclude: 'pnpm-lock.yaml'
      run: pnpm prettier --check {staged_files}

    - name: typecheck
      glob: '*.{ts,vue}'
      run: pnpm typecheck

pre-push:
  jobs:
    - name: test
      glob: '*.{js,mjs,ts,vue,prisma}'
      run: pnpm test

    - name: storybook-test
      run: pnpm --filter cms test:storybook
      skip:
        - run: test "$SKIP_STORYBOOK_TEST" = "1"
