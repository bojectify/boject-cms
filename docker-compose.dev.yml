services:
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - registry-data:/var/lib/registry

  verdaccio:
    image: verdaccio/verdaccio:5
    restart: unless-stopped
    ports:
      - '4873:4873'
    volumes:
      - verdaccio-storage:/verdaccio/storage
      - ./docker/verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro

volumes:
  registry-data:
  verdaccio-storage:
