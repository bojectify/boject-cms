# Separate Compose project name so these dev registries don't collide with the
# main stack (docker-compose.yml, project `boject-cms`). Without it both files
# default to the directory name and each `up` warns about the other's
# containers as orphans.
name: boject-cms-registries

services:
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - '5555:5000'
    volumes:
      - registry-data:/var/lib/registry

  verdaccio:
    image: verdaccio/verdaccio:5
    restart: unless-stopped
    ports:
      - '4873:4873'
    volumes:
      - verdaccio-storage:/verdaccio/storage
      - ./docker/verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro

volumes:
  registry-data:
  verdaccio-storage:
