services:
  db:
    image: postgres:17
    restart: unless-stopped
    # All dev ports declared on db because `dev` shares db's network namespace
    # (network_mode: service:db). That sharing means `localhost` inside the dev
    # container == postgres, matching the host dev experience and avoiding
    # rewriting `localhost`→`db` in .env, tests, perf:dev, etc.
    ports:
      - '127.0.0.1:5432:5432'
      - '127.0.0.1:4000:4000' # Nuxt dev server (forwarded to dev)
      - '127.0.0.1:6006:6006' # Storybook (forwarded to dev)
      - '127.0.0.1:5555:5555' # Prisma Studio (forwarded to dev)
      - '127.0.0.1:24678:24678' # Vite HMR websocket (forwarded to dev)
    environment:
      POSTGRES_USER: boject
      POSTGRES_PASSWORD: boject
      POSTGRES_DB: boject
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    # Share db's network namespace so `localhost:5432` resolves to postgres.
    # Keeps .env, tests, and perf:dev working identically to host execution.
    network_mode: 'service:db'
    depends_on:
      - db
    volumes:
      - .:/workspace:cached
      - pnpm-store:/pnpm-store
      # Persist Playwright's browser cache across container recreations.
      # Without this, every image rebuild wipes /home/node/.cache and the
      # next `pnpm test:storybook` errors with "headless_shell ENOENT".
      - playwright-cache:/home/node/.cache/ms-playwright
      # Anonymous-volume overlay: hides host's .git from the container so a
      # compromised dep can't rm -rf the local git history. Git ops stay on
      # host where they already have access.
      - /workspace/.git
    environment:
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-dev-only-placeholder-32-chars-long-xx}
      # Integration test database URLs. Unset by default; the test helpers
      # (apps/cms/test/dbUrl.ts + packages/boject-cli/tests/integration/dbUrl.ts)
      # fall back to the local-dev URLs. Set on host to point CI / a parallel
      # runner at a remote postgres without editing source.
      INTEGRATION_TEST_DATABASE_URL: ${INTEGRATION_TEST_DATABASE_URL:-}
      CLI_INTEGRATION_TEST_DATABASE_URL: ${CLI_INTEGRATION_TEST_DATABASE_URL:-}
      # Perf harness override. Unset by default; perf/lib/config-node.ts and
      # the pg-sampler fall back to the local-dev boject_perf URL. Forward
      # host-side `PERF_DATABASE_URL=... pnpm perf:sweep` so the override
      # reaches the container.
      PERF_DATABASE_URL: ${PERF_DATABASE_URL:-}

volumes:
  pgdata:
  pnpm-store:
  playwright-cache:
