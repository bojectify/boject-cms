services:
  db:
    image: postgres:17
    restart: unless-stopped
    # All dev ports declared on db because `dev` shares db's network namespace
    # (network_mode: service:db). That sharing means `localhost` inside the dev
    # container == postgres, matching the host dev experience and avoiding
    # rewriting `localhost`→`db` in .env, tests, perf:dev, etc.
    ports:
      - '127.0.0.1:5432:5432'
      - '127.0.0.1:4000:4000' # Nuxt dev server (forwarded to dev)
      - '127.0.0.1:6006:6006' # Storybook (forwarded to dev)
      - '127.0.0.1:5050:5050' # Prisma Studio (forwarded to dev; 5050 keeps host 5555 free for the dev Docker registry in docker-compose.dev.yml)
      - '127.0.0.1:24678:24678' # Vite HMR websocket (forwarded to dev)
      - '127.0.0.1:7700:7700' # Meilisearch (forwarded to dev via shared db namespace)
      - '127.0.0.1:6379:6379' # Redis (forwarded to dev via shared db namespace)
    environment:
      POSTGRES_USER: boject
      POSTGRES_PASSWORD: boject
      POSTGRES_DB: boject
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    init: true
    # Share db's network namespace so `localhost:5432` resolves to postgres.
    # Keeps .env, tests, and perf:dev working identically to host execution.
    network_mode: 'service:db'
    depends_on:
      - db
    volumes:
      - .:/workspace:cached
      - pnpm-store:/pnpm-store
      # Persist Playwright's browser cache across container recreations.
      # Without this, every image rebuild wipes /home/node/.cache and the
      # next `pnpm test:storybook` errors with "headless_shell ENOENT".
      - playwright-cache:/home/node/.cache/ms-playwright
      # Read-only bind mount of the host's .git directory. The Docker
      # filesystem layer rejects writes outright, so a compromised dep
      # cannot rewrite history, mutate refs, or stage commits — the same
      # write-blocking guarantee as the previous anonymous-volume overlay.
      #
      # The trade-off vs. the overlay: deps can now READ the full history.
      # That's acceptable because this repo is intended to be publicly
      # available on GitHub — anyone can clone the same history. The win
      # is that VS Code's Source Control / blame / diff / GitLens work
      # normally inside the container.
      #
      # GIT_OPTIONAL_LOCKS=0 in the environment block below tells git not
      # to take refresh locks (e.g. updating .git/index for stat-cache
      # repair on `git status`) — otherwise read-only ops can spuriously
      # complain about unwritable locks.
      - ./.git:/workspace/.git:ro
    environment:
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-dev-only-placeholder-32-chars-long-xx}
      # `git status` etc. inside the container can spuriously try to take
      # refresh locks on the read-only .git mount. Disabling optional
      # locks keeps read-only operations clean.
      GIT_OPTIONAL_LOCKS: '0'
      # Integration test database URLs. Unset by default; the test helpers
      # (apps/cms/test/dbUrl.ts + packages/boject-cli/tests/integration/dbUrl.ts)
      # fall back to the local-dev URLs. Set on host to point CI / a parallel
      # runner at a remote postgres without editing source.
      INTEGRATION_TEST_DATABASE_URL: ${INTEGRATION_TEST_DATABASE_URL:-}
      CLI_INTEGRATION_TEST_DATABASE_URL: ${CLI_INTEGRATION_TEST_DATABASE_URL:-}
      # Perf harness override. Unset by default; perf/lib/config-node.ts and
      # the pg-sampler fall back to the local-dev boject_perf URL. Forward
      # host-side `PERF_DATABASE_URL=... pnpm perf:sweep` so the override
      # reaches the container.
      PERF_DATABASE_URL: ${PERF_DATABASE_URL:-}
      # Search sidecar. Defaults work out of the box: the meilisearch service
      # below runs in dev mode (no master key) and shares db's network
      # namespace, so MEILI_URL=http://localhost:7700 with an empty key just
      # works. Override on the host to point dev/tests at a remote engine.
      MEILI_URL: ${MEILI_URL:-}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      # Cache backend (caching epic #254). The redis service below shares db's
      # network namespace, so REDIS_URL=redis://localhost:6379 just works;
      # ioredis even defaults to localhost:6379 when REDIS_URL is unset.
      # Override on the host to point dev at a remote cache.
      REDIS_URL: ${REDIS_URL:-}

  meilisearch:
    image: getmeili/meilisearch:v1.45.2
    restart: unless-stopped
    # Share db's network namespace (same reasoning as `dev`): `localhost:7700`
    # inside dev — and on the host, via db's published 7700 port — resolves to
    # Meilisearch. Keeps MEILI_URL=http://localhost:7700 identical for
    # containerised and native dev with no .env rewriting.
    network_mode: 'service:db'
    depends_on:
      - db
    environment:
      # Dev mode: all routes unauthenticated, no master key required. The CMS
      # dev process connects with an empty key. Production runs a separate
      # config with MEILI_ENV=production + a strong MEILI_MASTER_KEY.
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meilidata:/meili_data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # Share db's network namespace (same reasoning as `dev` and
    # `meilisearch`): `localhost:6379` inside dev — and on the host, via db's
    # published 6379 port — resolves to Redis. Keeps
    # REDIS_URL=redis://localhost:6379 identical for containerised and native
    # dev with no .env rewriting.
    network_mode: 'service:db'
    depends_on:
      - db
    # Cache only — no persistence. --save "" disables RDB snapshots,
    # --appendonly no disables the AOF, and there is no volume, so the cache
    # holds data in memory and restarts cold by design.
    command: redis-server --save "" --appendonly no

volumes:
  pgdata:
  pnpm-store:
  playwright-cache:
  meilidata:
