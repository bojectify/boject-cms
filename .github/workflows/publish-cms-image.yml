name: Publish CMS image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to GHCR (false = build + smoke-test only, no publish)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: publish-cms-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Docker meta (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bojectify/cms
          labels: |
            org.opencontainers.image.licenses=BUSL-1.1
            org.opencontainers.image.title=boject-cms
            org.opencontainers.image.description=boject-cms — general-purpose TypeScript headless CMS

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for gate (load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cms/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: boject/cms:gate
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max

      - name: Gate — full smoke test (amd64)
        if: ${{ matrix.platform == 'linux/amd64' }}
        env:
          SMOKE_IMAGE: boject/cms:gate
        run: apps/cms/docker/smoke-test.sh

      - name: Gate — boot check (arm64)
        if: ${{ matrix.platform == 'linux/arm64' }}
        env:
          SMOKE_IMAGE: boject/cms:gate
          BOOT_ONLY: '1'
        run: apps/cms/docker/smoke-test.sh

      - name: Build and push by digest
        id: build
        if: ${{ github.event_name == 'push' || inputs.push }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cms/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/bojectify/cms,push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        if: ${{ github.event_name == 'push' || inputs.push }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ github.event_name == 'push' || inputs.push }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'push' || inputs.push }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bojectify/cms
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=rc,enable=${{ contains(github.ref, '-rc') }}
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Word-splitting below is intentional: jq emits multiple `-t <tag>`
          # flags and printf emits multiple `image@sha256:digest` refs, both
          # meant to become separate args.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/bojectify/cms@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ghcr.io/bojectify/cms:${{ steps.meta.outputs.version }}

  verify:
    runs-on: ${{ matrix.runner }}
    needs: [merge]
    if: ${{ github.event_name == 'push' || inputs.push }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and boot the published image
        env:
          SMOKE_IMAGE: ghcr.io/bojectify/cms:${{ needs.merge.outputs.version }}
          BOOT_ONLY: '1'
        run: |
          docker pull "$SMOKE_IMAGE"
          apps/cms/docker/smoke-test.sh
