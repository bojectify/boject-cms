name: Publish create-boject-cms

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # apps/cms's postinstall (`nuxt prepare`) runs during the workspace install
    # and throws its production guard without this. Dummy value, not a secret.
    env:
      NUXT_SESSION_PASSWORD: ci-publish-session-password-not-a-secret-000
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - name: Install canvas build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter create-boject-cms build

      - name: Stamp LICENSE
        run: pnpm exec tsx scripts/stamp-license.ts packages/create-boject-cms/LICENSE --version "${GITHUB_REF_NAME#v}"

      - name: Skip if this version is already published
        id: published
        working-directory: packages/create-boject-cms
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.already == 'false'
        working-directory: packages/create-boject-cms
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            # npm refuses to default a prerelease to `latest`, so publish under `rc`.
            npm publish --provenance --access public --tag rc
            # Pre-1.0: keep `latest` on the newest release so the no-version
            # quickstart resolves — but never move a stable `latest`.
            CURRENT_LATEST=$(npm view "$NAME" dist-tags.latest 2>/dev/null || true)
            if [[ -z "$CURRENT_LATEST" || "$CURRENT_LATEST" == *-* ]]; then
              npm dist-tag add "$NAME@$VERSION" latest
            fi
          else
            npm publish --provenance --access public
          fi
