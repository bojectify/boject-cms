name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signatures are stored in this repo on a dedicated, unprotected branch
          # (no third-party service). The maintainer creates `cla-signatures`
          # once; the action appends each signature to the JSON file below.
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/bojectify/boject-cms/blob/main/CLA.md
          branch: cla-signatures
          # Maintainers (contributing under Boject Ltd) and bots are exempt.
          # Add other org-member logins here as the team grows.
          allowlist: ness-EE,*[bot]
