name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with Contents: read/write scoped to ONLY the private
          # bojectify/boject-cms-cla repo. Minimal scope matters: this workflow
          # runs on pull_request_target, so secrets are reachable from fork PRs.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_PAT }}
        with:
          # Signatures are stored in a separate PRIVATE repo, so contributor
          # identities stay off the public repo. `branch` is the branch WITHIN
          # that repo. Maintainer setup: create bojectify/boject-cms-cla (empty
          # is fine) + add the CLA_SIGNATURES_PAT secret before requiring the check.
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/bojectify/boject-cms/blob/main/CLA.md
          branch: main
          remote-organization-name: bojectify
          remote-repository-name: boject-cms-cla
          # Maintainers (contributing under Boject Ltd) and bots are exempt.
          # Add other org-member logins here as the team grows.
          allowlist: ness-EE,*[bot]
