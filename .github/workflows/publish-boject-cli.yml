name: Publish @boject/cli

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # apps/cms's postinstall (`nuxt prepare`) runs during the workspace install
    # and throws its production guard without this. Dummy value, not a secret.
    env:
      NUXT_SESSION_PASSWORD: ci-publish-session-password-not-a-secret-000
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      # No registry-url on purpose: setup-node's registry-url injects a
      # placeholder NODE_AUTH_TOKEN into .npmrc, so npm authenticates the
      # registry with that dummy token instead of OIDC trusted publishing
      # (→ E401). npm defaults to registry.npmjs.org for publish anyway.
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install -g npm@latest

      - name: Install canvas build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @boject/cli build

      - name: Stamp LICENSE
        run: pnpm exec tsx scripts/stamp-license.ts packages/boject-cli/LICENSE --version "${GITHUB_REF_NAME#v}"

      - name: Skip if this version is already published
        id: published
        working-directory: packages/boject-cli
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.already == 'false'
        working-directory: packages/boject-cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            # Prerelease → publish under the `rc` dist-tag only. `latest` is NOT
            # moved here: OIDC trusted publishing covers `npm publish` but not
            # `npm dist-tag`, so a maintainer moves `latest` by hand (2FA) if a
            # prerelease should front the no-version quickstart. Stable releases
            # (below) default to `latest` via OIDC automatically.
            npm publish --provenance --access public --tag rc
          else
            npm publish --provenance --access public
          fi
